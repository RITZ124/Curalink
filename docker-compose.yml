version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: curalink-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: curalink

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: curalink-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/curalink
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - HF_API_TOKEN=${HF_API_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PUBMED_EMAIL=${PUBMED_EMAIL:-research@curalink.ai}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: curalink-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
